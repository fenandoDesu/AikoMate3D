org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Gradle Kotlin DSL fails on JDK 25+ (IllegalArgumentException: 25.0.2 in JavaVersion.parse).
# Use JDK 17 or 21 for Android builds, e.g.:
#   export JAVA_HOME=$(/usr/libexec/java_home -v 21)
# Or uncomment and set an absolute path:
# org.gradle.java.home=/Library/Java/JavaVirtualMachines/temurin-21.jdk/Contents/Home